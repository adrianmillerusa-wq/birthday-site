<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choose</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #f8f5ff, #f3e8ff);
    font-family: 'Poppins', sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* TOP TEXT */
.top-text {
    font-family: 'Great Vibes', cursive;
    font-size: 2rem;
    color: #6a0dad;
    margin-bottom: 40px;
}

/* CHARACTER ROW */
.characters {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 60px;
    z-index: 2;
}

/* CHARACTER CARD */
.character {
    text-align: center;
    transition: transform 0.3s ease, filter 0.3s ease;
}

.character img {
    width: 180px;
    height: 260px;
    object-fit: contain;
    transition: 0.3s;
}

/* HOVER EFFECT */
.character:hover {
    transform: translateY(-10px) scale(1.05);
    filter: drop-shadow(0 10px 15px rgba(106,13,173,0.3));
}

/* BOTTOM TEXT */
.bottom-text {
    margin-top: 50px;
    font-size: 0.95rem;
    color: #6a0dad;
    opacity: 0.8;
    text-align: center;
    max-width: 300px;
    z-index: 2;
}

/* DECORATION IMAGES */
.deco {
    position: absolute;
    pointer-events: none;
    filter: blur(0.5px);
    z-index: 1;
    animation: float 5s ease-in-out infinite alternate;
}

/* Individual placements with rotation stored */
.gon {
    top: 5%;
    left: 5%;
    width: 120px;
    --rot: -15deg;
    opacity: 0.10;
}

.killua {
    bottom: 5%;
    left: 10%;
    width: 130px;
    --rot: 10deg;
    opacity: 0.13;
}

.kurapika {
    top: 10%;
    right: 5%;
    width: 130px;
    --rot: 12deg;
    opacity: 0.11;
}

.leorio {
    bottom: 5%;
    right: 10%;
    width: 120px;
    --rot: -10deg;
    opacity: 0.12;
}

.meruem {
    top: 35%;
    right: -20px;
    width: 140px;
    --rot: 0deg;
    opacity: 0.08;
}

/* FLOAT ANIMATION (FIXED) */
@keyframes float {
    from {
        transform: translateY(0) rotate(var(--rot));
    }
    to {
        transform: translateY(10px) rotate(var(--rot));
    }
}
</style>
</head>

<body>

<!-- DECOR -->

<img src="https://static.wikia.nocookie.net/all-worlds-alliance/images/6/65/3007.png/revision/latest/scale-to-width-down/340?cb=20190428020820" class="deco leorio">
<img src="https://hunterhunter-ni.bushiroad.com/wordpress/wp-content/themes/hunter-ni_v1/assets/images/common/character/img_meruem_tachie.png" class="deco meruem">
