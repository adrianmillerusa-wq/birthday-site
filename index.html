<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f8f5ff">
<title>Happy Birthday</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset & base ───────────────────────────────────── */
*, *::before, *::after {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent; /* removes Samsung blue flash on tap */
    touch-action: manipulation;               /* kills 300 ms tap delay */
}

html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    /* Lock orientation-related overflow */
    overflow: hidden;
}

body {
    min-height: 100dvh;          /* dvh = device viewport height (respects Samsung nav bar) */
    background: linear-gradient(135deg, #f8f5ff, #f3e8ff);
    font-family: 'Poppins', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: background 1s;
    /* Prevent text-size-adjust on Samsung Internet */
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
}

/* ── STREAMERS ──────────────────────────────────────── */
.streamer {
    position: fixed;        /* fixed keeps them edge-anchored on any tab size */
    width: 5px;
    height: 140px;
    background: linear-gradient(to bottom, gold, violet);
    top: -20px;
    border-radius: 3px;
    opacity: 0.55;
    animation: sway 4s infinite ease-in-out alternate;
    will-change: transform;
}
/* Staggered delays so they don't all sway in sync */
.streamer:nth-child(1) { animation-delay: 0s;    left: 6%; }
.streamer:nth-child(2) { animation-delay: 0.6s;  left: 22%; height: 160px; }
.streamer:nth-child(3) { animation-delay: 1.1s;  left: 50%; height: 145px; }
.streamer:nth-child(4) { animation-delay: 0.3s;  left: 78%; height: 155px; }
.streamer:nth-child(5) { animation-delay: 0.9s;  left: 92%; }

@keyframes sway {
    from { transform: rotate(-12deg); }
    to   { transform: rotate(12deg);  }
}

/* ── CARD ───────────────────────────────────────────── */
.card {
    background: white;
    /* clamp: 280px on tiny → comfortable on Galaxy Tab S8 (800px wide) → cap at 480px */
    width: clamp(280px, 70vw, 480px);
    padding: clamp(24px, 4vw, 48px) clamp(20px, 4vw, 44px);
    border-radius: 24px;
    box-shadow: 0 16px 48px rgba(106, 13, 173, 0.12);
    text-align: center;
    border: 1px solid rgba(200, 160, 255, 0.3);
    position: relative;
    z-index: 10;
}

/* ── MESSAGE ────────────────────────────────────────── */
.message {
    font-family: 'Great Vibes', cursive;
    /* clamp: readable on 280px → generous on 480px wide card */
    font-size: clamp(1.6rem, 4.5vw, 2.6rem);
    color: #6a0dad;
    line-height: 1.65;
    transition: opacity 0.6s ease;
    /* Prevent Samsung Internet from inflating this font */
    -webkit-text-size-adjust: none;
}

/* ── CAKE ───────────────────────────────────────────── */
.cake {
    display: block;
    margin: clamp(16px, 3vw, 28px) auto;
    /* Scales with card but never overflows */
    width: clamp(100px, 28vw, 180px);
    height: auto;
    /* GPU-composited rendering for smooth fade */
    will-change: opacity;
    /* Crisp on Samsung's high-DPI AMOLED */
    image-rendering: -webkit-optimize-contrast;
}

/* ── BUTTON ─────────────────────────────────────────── */
.btn {
    display: inline-block;
    margin: clamp(12px, 2vw, 20px) auto 0;
    /* Minimum 48×48 px touch target — Galaxy Tab a11y guideline */
    padding: 14px 32px;
    min-height: 48px;
    min-width: 48px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(45deg, gold, #d4af37);
    color: #4b0082;
    font-family: 'Poppins', sans-serif;
    font-size: clamp(0.9rem, 2vw, 1.1rem);
    font-weight: 500;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    /* Eliminate tap delay on Samsung Internet */
    touch-action: manipulation;
    -webkit-appearance: none;
    user-select: none;
}
.btn:hover  { transform: scale(1.05); box-shadow: 0 6px 20px rgba(212,175,55,0.4); }
.btn:active { transform: scale(0.97); box-shadow: none; } /* tactile feedback on touch */

/* ── CONFETTI ───────────────────────────────────────── */
.confetti {
    position: fixed;   /* fixed so it covers full Galaxy Tab screen */
    width: 8px;
    height: 8px;
    border-radius: 2px;
    opacity: 0.75;
    top: -12px;
    animation: fall linear forwards;
    will-change: transform;
    pointer-events: none;
}
/* Alternate shapes */
.confetti.circle { border-radius: 50%; }
.confetti.ribbon { width: 4px; height: 14px; border-radius: 2px; }

@keyframes fall {
    0%   { transform: translateY(0)      translateX(0)     rotate(0deg);   }
    50%  { transform: translateY(50vh)   translateX(30px)  rotate(180deg); }
    100% { transform: translateY(110vh)  translateX(-20px) rotate(360deg); }
}

/* ── FADE OVERLAY ───────────────────────────────────── */
#fade {
    position: fixed;
    inset: 0;                  /* shorthand for top/right/bottom/left: 0 */
    background: black;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1s ease;
    z-index: 999;
}
</style>
</head>
<body>

<div id="fade"></div>

<!-- One extra streamer for the wider tablet canvas -->
<div class="streamer"></div>
<div class="streamer"></div>
<div class="streamer"></div>
<div class="streamer"></div>
<div class="streamer"></div>

<div class="card">
    <div class="message" id="message">
        Happy birthday, my favorite human.<br>
        Another year older… somehow still tolerable.<br>
        I love you.
    </div>
    <img
        src="https://png.pngtree.com/png-clipart/20250101/original/pngtree-a-large-purple-birthday-cake-with-white-candles-clipart-png-image_18496498.png"
        class="cake"
        alt="Birthday cake with candles"
        draggable="false"
        loading="eager"
    >
    <button class="btn" id="btn">Blow the candles 🕯️</button>
</div>

<script>
(function () {
    const btn     = document.getElementById("btn");
    const message = document.getElementById("message");
    const fade    = document.getElementById("fade");

    /* ── Confetti launcher ──────────────────────────── */
    function launchConfetti() {
        const shapes  = ["", "circle", "ribbon"];
        const colors  = ["gold", "violet", "#ff69b4", "#00cfff", "#7fff00"];
        const W       = window.innerWidth;

        for (let i = 0; i < 150; i++) {
            const el = document.createElement("div");
            el.classList.add("confetti");
            // random shape
            el.classList.add(shapes[Math.floor(Math.random() * shapes.length)]);
            el.style.left             = (Math.random() * W) + "px";
            el.style.background       = colors[Math.floor(Math.random() * colors.length)];
            el.style.animationDuration = (Math.random() * 2.5 + 2) + "s";
            el.style.animationDelay   = (Math.random() * 1.2) + "s";
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 5500);
        }
    }

    /* ── Main click / tap handler ───────────────────── */
    function handleBlow() {
        // Prevent double-fire from touch + click on Samsung Internet
        btn.removeEventListener("click",       handleBlow);
        btn.removeEventListener("touchend",    handleBlow);

        message.innerHTML = "Make a wish.....";
        btn.style.display = "none";

        launchConfetti();

        // After 5 seconds → transition to second scene
        setTimeout(function () {
            fade.style.opacity = "1";

            setTimeout(function () {
                document.body.style.background = "linear-gradient(135deg, #2a003f, #140021)";
                message.style.opacity = "0";

                setTimeout(function () {
                    message.innerHTML    = "I already made mine.";
                    message.style.opacity = "1";
                }, 500);

                // "Delve deeper" button
                var newBtn = document.createElement("button");
                newBtn.innerText  = "Delve deeper ✨";
                newBtn.className  = "btn";
                newBtn.style.marginTop = "16px";

                function goToPage2() {
                    newBtn.removeEventListener("click",    goToPage2);
                    newBtn.removeEventListener("touchend", goToPage2);
                    fade.style.opacity = "1";
                    setTimeout(function () {
                        window.location.href = "page2.html";
                    }, 1000);
                }

                // Bind both events for Galaxy Tab Samsung Internet compatibility
                newBtn.addEventListener("click",    goToPage2);
                newBtn.addEventListener("touchend", function (e) {
                    e.preventDefault(); // prevent ghost click
                    goToPage2();
                });

                document.querySelector(".card").appendChild(newBtn);
                fade.style.opacity = "0";
            }, 1000);
        }, 5000);
    }

    /* Bind both click and touchend to support Samsung Internet */
    btn.addEventListener("click",    handleBlow);
    btn.addEventListener("touchend", function (e) {
        e.preventDefault();
        handleBlow();
    });
})();
</script>
</body>
</html>
