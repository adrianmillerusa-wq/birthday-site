<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Songs</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: linear-gradient(135deg, #140021, #2a003f);
    font-family: 'Poppins', sans-serif;
    padding: 30px 20px;
    color: white;
}

/* HEADER */
.header {
    text-align: center;
    margin-bottom: 30px;
}
.main-title {
    font-family: 'Great Vibes', cursive;
    font-size: 2.2rem;
    color: #e9d5ff;
}
.sub-title {
    font-size: 0.9rem;
    opacity: 0.7;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
}

/* SONG */
.song {
    background: #1c012e;
    border-radius: 12px;
    overflow: hidden;
    transition: 0.3s;
}
.song:hover {
    background: #25003d;
}

@media (max-width: 600px) {
    .container {
        grid-template-columns: 1fr;
    }
}

.song-header {
    display: flex;
    align-items: center;
    padding: 12px;
    gap: 12px;
}

.cover {
    width: 55px;
    height: 55px;
    border-radius: 8px;
    object-fit: cover;
}

.info { flex: 1; }
.title { font-size: 0.95rem; }
.artist { font-size: 0.8rem; opacity: 0.6; }

.play-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: none;
    background: #a855f7;
    color: white;
    cursor: pointer;
}

/* LYRICS */
.lyrics {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.5s ease;
}
.song.active .lyrics {
    overflow-y: auto;
    max-height: 200px;
    padding: 12px;
    display: flex;
    gap: 10px;
}

.col { flex: 1; font-size: 0.85rem; }
.line { opacity: 0.4; }
.line.active { opacity: 1; color: #c084fc; }

/* FOOTER */
.footer {
    text-align: center;
    margin-top: 40px;
}
.back-btn {
    padding: 10px 18px;
    border-radius: 20px;
    border: none;
    background: #a855f7;
    color: white;
    cursor: pointer;
}
</style>
</head>

const container = document.getElementById("container");
const songs = [];

songData.forEach((data, i) => {
    const songDiv = document.createElement("div");
    songDiv.className = "song";

    songDiv.innerHTML = `
        <div class="song-header">
            <img src="cover${i+1}.jpg" class="cover">
            <div class="info">
                <div class="title">${data.title}</div>
                <div class="artist">${data.artist}</div>
            </div>
            <button class="play-btn" onclick="playSong(${i})">▶</button>
        </div>
        <div class="lyrics">
            <div class="col" id="left${i}"></div>
            <div class="col" id="right${i}"></div>
        </div>
    `;

    container.appendChild(songDiv);

    songs.push({
        audio: new Audio(`song${i+1}.mp3`),
        lyrics: lyricsData[i]
    });
});

let current = null;

function playSong(index) {
    const song = songs[index];

    // toggle pause
    if (current === song && !song.audio.paused) {
        song.audio.pause();
        return;
    }

    // stop previous
    if (current) {
        current.audio.pause();
        current.audio.currentTime = 0;
    }

    current = song;

    // activate UI
    document.querySelectorAll(".song").forEach(s => s.classList.remove("active"));
    document.querySelectorAll(".song")[index].classList.add("active");

    renderLyrics(index);
    song.audio.play();
    syncLyrics(song, index);

    document.querySelectorAll(".play-btn").forEach(btn => btn.innerText = "▶");
    document.querySelectorAll(".play-btn")[index].innerText = "⏸";
}

function renderLyrics(index) {
    const left = document.getElementById("left" + index);
    const right = document.getElementById("right" + index);

    left.innerHTML = "";
    right.innerHTML = "";

    songs[index].lyrics.forEach(l => {
        left.innerHTML += `<div class="line">${l.text}</div>`;
        right.innerHTML += `<div class="line">${l.trans}</div>`;
    });
}

function syncLyrics(song, index) {
    const linesLeft = document.querySelectorAll(`#left${index} .line`);
    const linesRight = document.querySelectorAll(`#right${index} .line`);

    song.audio.ontimeupdate = () => {
        let time = song.audio.currentTime;

        for (let i = 0; i < song.lyrics.length; i++) {
    if (
        time >= song.lyrics[i].time &&
        (i === song.lyrics.length - 1 || time < song.lyrics[i + 1].time)
    ) {
        linesLeft.forEach(line => line.classList.remove("active"));
        linesRight.forEach(line => line.classList.remove("active"));

        if (linesLeft[i]) linesLeft[i].classList.add("active");
        if (linesRight[i]) linesRight[i].classList.add("active");

        break;
        }
        };
    };
}

function goBack() {

    setTimeout(() => {
